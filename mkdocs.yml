site_name: MarsonShine's Books
site_description: 读书笔记索引 - 涵盖 C#、分布式系统、操作系统、算法等领域
site_author: MarsonShine
site_url: https://marsonshine.github.io/Books/

docs_dir: .
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

plugins:
  - search:
      lang: zh

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - fenced_code
  - admonition
  - attr_list

nav:
  - 首页: index.md
  - C# 异步:
    - 简介: AsyncInCSharp/docs/index.md
    - 编写异步方法: AsyncInCSharp/docs/Writing-Async-Methods.md
